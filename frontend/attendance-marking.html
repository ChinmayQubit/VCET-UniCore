<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Marking - VCET Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/dashboard.css">
    <style>
        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .attendance-table th, .attendance-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .status-toggle {
            display: flex;
            gap: 10px;
        }
        .status-btn {
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #fff;
            transition: all 0.3s ease;
        }
        .status-btn.present { border-color: #2ecc71; color: #2ecc71; }
        .status-btn.absent { border-color: #e74c3c; color: #e74c3c; }
        .status-btn.active.present { background: #2ecc71; color: #fff; }
        .status-btn.active.absent { background: #e74c3c; color: #fff; }
        
        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="admin-body">

    <div class="background-glow"></div>

    <main class="admin-main" style="max-width: 1000px; margin: auto; padding-top: 4rem;">
        
        <div class="card form-card">
            <div class="card-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
                <h2>Mark Student Attendance</h2>
                <a href="admin-dashboard.html" class="btn-outline" style="text-decoration:none;">Back to Admin</a>
            </div>

            <div class="filter-section">
                <div class="form-group">
                    <label>Semester</label>
                    <select id="filterSemester" class="form-control" onchange="loadStudentsAndSubjects()" style="background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 4px; width: 100%;">
                        <option value="">Select Semester</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select id="filterSubject" class="form-control" style="background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 4px; width: 100%;">
                        <option value="">Select Subject</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="attendanceDate" class="form-control" style="background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 4px; width: 100%;">
                </div>
                <div class="form-group">
                    <label>Session (Lecture #)</label>
                    <input type="number" id="sessionNumber" value="1" min="1" class="form-control" style="background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 4px; width: 100%;">
                </div>
            </div>

            <div id="studentListContainer" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                    <h3>Student Roster</h3>
                    <div style="display:flex; gap: 10px;">
                        <button class="btn-outline" onclick="setAllAttendance('PRESENT')">Mark All Present</button>
                        <button class="btn-outline" onclick="setAllAttendance('ABSENT')">Mark All Absent</button>
                    </div>
                </div>
                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>Roll ID</th>
                            <th>Student Name</th>
                            <th>Department</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody">
                        <!-- Dynamically filled -->
                    </tbody>
                </table>

                <button class="btn-primary" style="width:100%; margin-top: 2rem;" onclick="submitAttendance()">Submit Attendance</button>
            </div>
            
            <div id="noDataMessage" style="text-align:center; padding: 3rem; color: var(--text-muted);">
                Select a semester to load student data.
            </div>
        </div>
        
    </main>

    <script type="module">
        import { initAttendancePage } from '/src/pages/attendance.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            initAttendancePage();
            // Set default date to today
            document.getElementById('attendanceDate').valueAsDate = new Date();
        });
    </script>
</body>
</html>
